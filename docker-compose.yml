services:
  actual:
    image: actualbudget/actual-server:latest
    container_name: actual-budget
    expose:
      - "5006"
    volumes:
      - ./data:/data
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy-actual
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - actual
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
